<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>An Ion Channel Story</title>
  <style>
    /* Basic Reset */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      color: gray;
      background-color: #FFFFFF;
      overflow-x: hidden; /* Prevent horizontal scrolling */
    }

    /* Side Menu Styles */
    .menu-bar {
      position: fixed;
      top: 0;
      left: -250px; /* Initially hidden off-screen */
      width: 250px; /* Width of the side menu */
      height: 100%;
      background-color: #333;
      color: white;
      transition: 0.3s; /* Smooth transition when sliding */
      z-index: 1000;
      padding-top: 60px; /* Space for menu items */
    }

    .menu-bar ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
    }

    .menu-bar ul li {
      padding: 8px 16px;
      text-align: left;
    }

    .menu-bar ul li a {
      color: white;
      text-decoration: none;
      display: block;
    }

    .menu-bar ul li a:hover {
      background-color: #575757;
      border-radius: 5px;
    }

    /* Hamburger Icon Styles */
    .menu-icon {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 30px;
      cursor: pointer;
      z-index: 1001; /* Above the menu */
    }

    /* Hover Expansion */
    .menu-bar:hover {
      left: 0; /* Move the menu into view when hovered */
    }

    .menu-bar.open {
      left: 0; /* Make the menu visible when the class 'open' is added */
    }

    /* General content styling */
    .content {
      margin-left: 0; /* Adjust content to fit when menu is expanded */
      transition: margin-left 0.3s; /* Smooth content shift when the menu expands */
    }

    .menu-bar.open + .content {
      margin-left: 200px; /* Shift content when menu is expanded */
    }

    /* Container for the images */
    .image-container {
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-wrap: wrap;
      padding: 50px;
      margin-top: 100px; /* Add some space from top */
    }

    .container {
      width: 50%;
      padding: 20px;
      background-color: #FFFFFF;
      margin: 20px;
      border-radius: 8px;
      position: relative; /* Enable absolute positioning inside */
    }

    /* First container */
    .container:nth-child(1) {
      width: 40%; /* Adjust size */
      top: 1vh; /* Place at 100px from the top */
      left: 0vw; /* Place 50px from the left */
    }

    /* Second container */
    .container:nth-child(2) {
      width: 30%; /* Adjust size */
      top: 3vh; /* Place at 100px from the top */
      left: 0vw; /* Place 50px from the left */
    }

    /* Third container */
    .container:nth-child(3) {
      width: 12%; /* Adjust size */
      top: 0vh; /* Place at 100px from the top */
      right: 3vw; /* Place 50px from the left */
    }

    /* Animation for the containers */
    .container:nth-child(1), .container:nth-child(2), .container:nth-child(3) {
      animation: fadeInUp 0.8s forwards;
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Image styling */
    .image-container img {
      /*position:absolut; */
      width: 100%;
      height: auto;
      border-radius: 0px;
      transition: transform 0.3s ease-in-out;
    }

    /* Hover effect for images */
    .image-container img:hover {
      transform: scale(1.05);
    }

    /* Top-Right Header */
    .top-right {
      top: 20px;
      right: 2vw;
      font-size: 2rem;
      color: #333;
      background-color: rgba(255, 255, 255, 0.7);
      padding: 10px 20px;
      border-radius: 5px;
    }

    .new-section {
      background-color: black;
      padding: 50px 40px;
      color: white;
    }

    .new-section .image-row {
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: 5px;
    }

    .new-section .image-row img {
      width: 18%;
      height: auto;
      border-radius: 0px;
      transition: transform 0.3s ease-in-out;
    }


    .new-section .image-row img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <!-- Hamburger Icon -->
  <div class="menu-icon" onclick="toggleMenu()">
    &#9776; <!-- Hamburger icon -->
  </div>

  <!-- Side Menu -->
  <div class="menu-bar" id="menuBar">
    <ul>
      <li><a href="/bkchannel/index.html">Home</a></li>
      <li><a href="/bkchannel/page1.html">BK</a></li>
      <li><a href="/bkchannel/page2.html">Lipids</a></li>
      <li><a href="/bkchannel/page3.html">About This</a></li>
      <li><a href="/bkchannel/page3.html">About This</a></li>
      <li><a href="/bkchannel/aboutme.html">About Me</a></li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="content">
    <!-- Top-right Heading -->
    <h2 class="top-right">Images</h2>
    
    <div class="image-container">
      <!-- First Image Container -->
      <div class="container" id="section1">
        <img src="https://crnlcu.github.io/bkchannel/media/latoCLOSED.png" alt="Image 1">
      </div>

      <!-- Second Image Container -->
      <div class="container" id="section2">
        <img src="https://crnlcu.github.io/bkchannel/media/latoINT.png" alt="Image 2">
      </div>

      <!-- Third Image Container -->
      <div class="container" id="section3">
        <img src="https://crnlcu.github.io/bkchannel/media/popc_s.png" alt="Image 3">
      </div>
    </div>

    <!-- New Section -->
    <div class="new-section"> 
      <div class="image-row">
        <img src="https://crnlcu.github.io/bkchannel/media/helix0.png" alt="Image 1">
        <img src="https://crnlcu.github.io/bkchannel/media/helix1.png" alt="Image 2">
        <img src="https://crnlcu.github.io/bkchannel/media/helix2.png" alt="Image 3">
        <img src="https://crnlcu.github.io/bkchannel/media/helix3.png" alt="Image 4">
        <img src="https://crnlcu.github.io/bkchannel/media/helix4.png" alt="Image 5">
      </div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menuBar = document.getElementById('menuBar');
      menuBar.classList.toggle('open'); /* Toggle the 'open' class */
    }
  </script>
</body>
</html>
