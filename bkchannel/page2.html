<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>An Ion Channel Story</title>
  <style>
    /* Basic Reset */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      color: gray;
      background-color: #FFFFFF;
      overflow-x: hidden; /* Prevent horizontal scrolling */
    }

    /* Side Menu Styles */
    .menu-bar {
      position: fixed;
      top: 0;
      left: -250px; /* Initially hidden off-screen */
      width: 250px; /* Width of the side menu */
      height: 100%;
      background-color: #333;
      color: white;
      transition: 0.3s; /* Smooth transition when sliding */
      z-index: 1000;
      padding-top: 60px; /* Space for menu items */
    }

    .menu-bar ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
    }

    .menu-bar ul li {
      padding: 8px 16px;
      text-align: left;
    }

    .menu-bar ul li a {
      color: white;
      text-decoration: none;
      display: block;
    }

    .menu-bar ul li a:hover {
      background-color: #575757;
      border-radius: 5px;
    }

    /* Hamburger Icon Styles */
    .menu-icon {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 30px;
      cursor: pointer;
      z-index: 1001; /* Above the menu */
    }

    /* Hover Expansion */
    .menu-bar:hover {
      left: 0; /* Move the menu into view when hovered */
    }

    .menu-bar.open {
      left: 0; /* Make the menu visible when the class 'open' is added */
    }

    /* General content styling */
    .content {
      margin-left: 0; /* Adjust content to fit when menu is expanded */
      transition: margin-left 0.3s; /* Smooth content shift when the menu expands */
    }

    .menu-bar.open + .content {
      margin-left: 200px; /* Shift content when menu is expanded */
    }

    /* Container for the images */
    .image-container {
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-wrap: wrap;
      padding: 50px;
      margin-top: 1px; /* Add some space from top */
    }

    .container {
      width: 100%;
      padding: 20px;
      background-color: #FFFFFF;
      margin: 20px;
      border-radius: 8px;
    
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s forwards;
    }

    /* Animation for the containers */
    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Delay animations for each container */
    .container:nth-child(1) {
      animation-delay: 0.3s;
    }

    .container:nth-child(2) {
      animation-delay: 0.6s;
    }

    .container:nth-child(3) {
      animation-delay: 0.9s;
    }

    /* Image styling */
    .image-container img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      transition: transform 0.3s ease-in-out;
    }

    /* Hover effect for images */
    .image-container img:hover {
      transform: scale(1.05);
    }

    /* Top-Right Header */
    .top-right {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 2rem;
      color: #333;
      background-color: rgba(255, 255, 255, 0.7);
      padding: 10px 20px;
      border-radius: 5px;
    }

    /* Banner (Modal) Styles */
    .modal {
      display: none; /* Initially hidden */
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent background */
      justify-content: center;
      align-items: center;
      z-index: 9999; /* Ensure it's above all other content */
    }

    .modal-content {
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      width: 60%;
      text-align: center;
    }

    .modal-content h3 {
      margin-top: 0;
    }

    .close-btn {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .close-btn:hover {
      background-color: #575757;
    }
  </style>
</head>
<body>
  <!-- Hamburger Icon -->
  <div class="menu-icon" onclick="toggleMenu()">
    &#9776; <!-- Hamburger icon -->
  </div>

  <!-- Side Menu -->
  <div class="menu-bar" id="menuBar">
    <ul>
      <li><a href="#section1">Home</a></li>
      <li><a href="#section2">BK</a></li>
      <li><a href="#section3">Lipids</a></li>
      <li><a href="#section4">About This</a></li>
      <li><a href="#section5">About Me</a></li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="content">
    <div class="image-container">
      <!-- First Image Container -->
      <div class="container" id="section1" onclick="openModal('Side view of tranmembrane portion of the BK channel. From left to right, inactive, intermediate, active')">
        <img src="https://crnlcu.github.io/bkchannel/media/lato3.png" alt="Image 1">
      </div>

      <h2>Looking at the Way Out</h2>

      <!-- Second Image Container -->
      <div class="container" id="section2" onclick="openModal('Bottom view of tranmembrane portion of the BK channel. <\br>Inactive State: In this state, the ion channel is closed, and ions are not able to pass through it. </br> Intermediate State: This is a transitional state where the ion channel is partially open, and there is a possibility for ion movement depending on the specific properties of the channel. </br> Active State: In this state, the ion channel is fully open, allowing ions to pass through the channel. This typically occurs when there is a specific stimulus, such as a voltage change or ligand binding, that triggers the channel to open fully. During this process, ions (such as K⁺-potassium) flow through the channel from inside the cell (intracellular space) to the outside (extracellular space), or vice versa, depending on the type of channel and the concentration gradient of the ions.')">
        <img src="https://crnlcu.github.io/bkchannel/media/3sotto.png" alt="Image 2">
      </div>
    </div>
  </div>

  <!-- Modal Banner (Hidden initially) -->
  <div class="modal" id="imageModal">
    <div class="modal-content">
      <h3 id="modalTitle">Modal Title</h3>
      <p id="modalDescription">Here will be the explanation for the image.</p>
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menuBar = document.getElementById('menuBar');
      menuBar.classList.toggle('open'); /* Toggle the 'open' class */
    }

    function openModal(description) {
      const modal = document.getElementById('imageModal');
      const title = document.getElementById('modalTitle');
      const descriptionText = document.getElementById('modalDescription');

      title.textContent = description.split(":")[0]; // Extract the title
      descriptionText.textContent = description.split(":")[1]; // Extract the description

      modal.style.display = 'flex'; // Show the modal
    }

    function closeModal() {
      const modal = document.getElementById('imageModal');
      modal.style.display = 'none'; // Hide the modal
    }
  </script>
</body>
</html>
