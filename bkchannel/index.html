    /* General styles */
    body, html {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: white;
    }

    .section0 {
      position: relative;
      width: 100vw;
      height: 65vw;
      overflow: hidden;
    }

    .section0 video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .text-right {
      position: absolute;
      left: 55vw;
      top: 20vh;
      padding: 20px;
      z-index: 2;
      font-size: 2vw;
    }

    .text-right h1 {
      margin: 0;
      font-weight: bold;
    }

    .text-right p {
      font-size: 1.5vw;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .arrow-down {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 10vw;
      animation: bounce 2s infinite;
      z-index: 2;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(10px);
      }
    }

    .section1, .section2 {
      width: 100vw;
      padding: 15px;
    }

    .section1 {
      background-color: white;
      color: black;
    }

    .section2 {
      background-color: black;
      color: white;
    }

    .section1 img, .section2 img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      transition: transform 0.3s ease-in-out;
    }

    .section1 img:hover, .section2 img:hover {
      transform: scale(1.05);
    }

    h1 {
      font-size: 4vw;
      color: gray;
      text-align: right;
    }

    p {
      color: #8B61C2;
      text-align: right;
    }
