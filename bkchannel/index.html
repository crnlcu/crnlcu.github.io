<!DOCTYPE html>

  <title>An Ion Channel Story</title>
  <style>
 /* Fixed top menu bar */
    .menu-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #;
      color: white;
      padding: 10px 20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      z-index: 1000;
    }

    .menu-bar ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      display: flex;
    }

    .menu-bar ul li {
      margin-right: 10px;
    }

    .menu-bar ul li a {
      color: white;
      text-decoration: none;
      padding: 8px 15px;
      display: block;
    }

    .menu-bar ul li a:hover {
      background-color: #575757;
      border-radius: 5px;
    }
    /* General styles */
    body, html {
      margin: 0;
      padding: 0;
      height: auto;
      width: 100%;
      font-family: Arial, sans-serif;
      color: white;
      overflow: scroll; /* Prevent scrolling */
      background-color: #000000;
    }
  

    video {
    position:absolute;
      max-width: 80%;
    height: auto;
      top: 10vh;
    left: 0vw;
      overflow: scroll;
    }



    .text-right {
      width: 100%;
      height: auto;
      position:absolute;
      left: 55vw;
      top:20vh;
      justify-content: center;
      padding: 20px;
      text-align: left;
      z-index: 1000;
      font-size:2vw;
    }

    .text-right h1 {

      margin: 0;
      font-weight: bold;
      z-index: inherit;
    }

    .text-right p {
      font-size: 1.5vw;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      z-index: inherit;
    }


    /* Downward arrow */
    .arrow-down {
      position: absolute;
      margin-top: 3em;
	  right: 0.67em;
      font-size: 10vw;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(10px);
      }
    }
    a:link, a:hover{
  color: pink;
  background-color: transparent;
  text-decoration: none;
}
.section0 {
      width: 100vw;
      height:  42vw;
      background-color:black;
      padding: 20px;
      color: white;
    }


.section1 {
      width: 100vw;
      height: 52vw;
      background-color:white;
      padding: 10px;
      color: black;
    }
    .section1 img {
      width: 100%;
      height: auto;
      top: 0;
      border-radius: 8px;
      transition: transform 0.3s ease-in-out;
    }

    .section1 img:hover {
      transform: scale(1.05);
    }
.section2 {
      width: 100vw;
      height: 52vw;
      background-color:black;
      padding: 20px;
      color: black;
    }
    .section2 img {
      width: 18%;
      height: auto;
      top: 10px;
      border-radius: 8px;
      transition: transform 0.3s ease-in-out;
    }

    .section2 img:hover {
      transform: scale(1.05);
    }


  </style>
</head>
