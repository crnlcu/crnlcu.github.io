<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>An Ion Channel Story</title>
  <style>
    /* Fixed top menu bar */
    .menu-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: transparent;
      color: white;
      padding: 10px 20px;
      z-index: 1000;
      font-size: 1.5vw;
    }

    .menu-bar ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      display: flex;
    }

    .menu-bar ul li {
      margin-right: 10px;
    }

    .menu-bar ul li a {
      color: white;
      text-decoration: none;
      padding: 8px 15px;
      display: block;
    }

    .menu-bar ul li a:hover {
      background-color: #575757;
      border-radius: 5px;
    }

    /* Side Menu Styles */
    .menu-bar-side {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100%;
      background-color: #333;
      color: white;
      transition: left 0.3s ease;
      z-index: 1000;
      padding-top: 60px;
    }

    .menu-bar-side ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
    }

    .menu-bar-side ul li {
      padding: 8px 16px;
      text-align: left;
    }

    .menu-bar-side ul li a {
      color: white;
      text-decoration: none;
      display: block;
    }

    .menu-bar-side ul li a:hover {
      background-color: #575757;
      border-radius: 5px;
    }

    .menu-icon {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 30px;
      cursor: pointer;
      z-index: 1001;
    }

    .menu-bar-side.open {
      left: 0;
    }

    .content {
      transition: margin-left 0.3s ease;
    }

    .menu-bar-side.open + .content {
      margin-left: 250px;
    }

    /* General styles */
    body, html {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: white;
    }

    .section0 {
      position: relative;
      width: 100vw;
      height: 65vw;
      overflow: hidden;
    }

    .section0 video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .text-right {
      position: absolute;
      left: 55vw;
      top: 20vh;
      padding: 20px;
      z-index: 2;
      font-size: 2vw;
    }

    .text-right h1 {
      margin: 0;
      font-weight: bold;
    }

    .text-right p {
      font-size: 1.5vw;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .arrow-down {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 10vw;
      animation: bounce 2s infinite;
      z-index: 2;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(10px);
      }
    }

    .section1, .section2 {
      width: 100vw;
      padding: 15px;
    }

    .section1 {
      background-color: white;
      color: black;
    }

    .section2 {
      background-color: black;
      color: white;
    }

    .section1 img, .section2 img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      transition: transform 0.3s ease-in-out;
    }

    .section1 img:hover, .section2 img:hover {
      transform: scale(1.05);
    }

    h1 {
      font-size: 4vw;
      color: gray;
      text-align: right;
    }

    p {
      color: #8B61C2;
      text-align: right;
    }
  </style>
</head>
<body>
  <!-- Section 0 -->
  <div class="section0" id="section0">
    <div class="menu-bar">
      <ul>
        <li><a href="/bkchannel/index.html">Home</a></li>
        <li><a href="/bkchannel/bk/index.html">BK</a></li>
        <li><a href="/bkchannel/about/index.html">About</a></li>
        <li><a href="/bkchannel/contact/index.html">Contact</a></li>
      </ul>
    </div>
    <video autoplay muted loop>
      <source src="https://crnlcu.github.io/bkchannel/media/videoBW.mp4" type="video/mp4">
    </video>
    <div class="text-right">
      <h1>An Ion Channel Story</h1>
      <p>Lucia Coronel</p>
    </div>
    <div class="arrow-down">↓</div>
  </div>

  <!-- Hamburger Icon and Side Menu -->
  <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
  <div class="menu-bar-side" id="menuBar-side">
    <ul>
      <li><a href="#section0">Home</a></li>
      <li><a href="#section1">BK</a></li>
      <li><a href="/bkchannel/about/index.html">About</a></li>
      <li><a href="/bkchannel/contact/index.html">Contact</a></li>
    </ul>
  </div>

  <!-- Section 1 -->
  <div class="section1" id="section1">
    <h1>Images</h1>
    <img src="https://crnlcu.github.io/bkchannel/media/images.png" alt="Image 1">
    <p>Amino acid sequence visualization</p>
  </div>

  <!-- Section 2 -->
  <div class="section2" id="section2">
    <img src="https://crnlcu.github.io/bkchannel/media/helix0.png" alt="Helix 0">
    <img src="https://crnlcu.github.io/bkchannel/media/helix1.png" alt="Helix 1">
    <img src="https://crnlcu.github.io/bkchannel/media/helix2.png" alt="Helix 2">
    <img src="https://crnlcu.github.io/bkchannel/media/helix3.png" alt="Helix 3">
    <img src="https://crnlcu.github.io/bkchannel/media/helix4.png" alt="Helix 4">
  </div>

  <script>
    function toggleMenu() {
      const sideMenu = document.getElementById('menuBar-side');
      sideMenu.classList.toggle('open');
    }
  </script>
</body>
</html>
