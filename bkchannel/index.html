<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Background Page</title>
  <style>
    /* General Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Fullscreen container */
    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      color: white;
    }

    /* Video background styling */
    .video-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }

    .video-background video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Centered text styling */
    .content {
      position: absolute;
      top: 50%;
      left: 70%;
      transform: translate(-50%, -50%);
      text-align: left;
    }

    .content h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .content p {
      font-size: 1.5rem;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <!-- Background Video -->
  <div class="video-background">
    <video autoplay muted loop>
      <source src="https://github.com/crnlcu/crnlcu.github.io/blob/master/bkchannel/media/trajectory_video3.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

  <!-- Centered Content -->
  <div class="content">
  <p>IMAGES FROM</p>
    <h1>An Ion Channel Story </h1>

   <footer>
        <p>&copy; 2025 An Ion Channel Story</p>
    </footer>
  </div>
</body>
</html>
