    .arrow-down {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 5rem;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(10px);
      }
    }
