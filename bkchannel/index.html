<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>An Ion Channel Story</title>
  <style>
    /* General styles */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden; /* Prevent scrolling */
    }

    /* Fullscreen video background */
    .video-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .video-container video {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
    }

    /* Overlay content */
    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      box-sizing: border-box;
    }

    .text-left {
      width: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .text-right {
      width: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      text-align: left;
    }

    .text-right h1 {
      font-size: 3rem;
      margin: 0;
      font-weight: bold;
    }

    .text-right p {
      font-size: 1.2rem;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Downward arrow */
    .arrow-down {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 2rem;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(10px);
      }
    }
  </style>
</head>
<body>

  <!-- Video Background -->
  <div class="video-container">
    <video autoplay muted loop>
      <source src="video_intro.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

  <!-- Overlay Content -->
  <div class="content">
    <!-- Left Side: Placeholder for Image or Video -->
    <div class="text-left">
      <img src="image_placeholder.png" alt="Molecular structure" style="max-width: 80%; height: auto;">
    </div>
    <!-- Right Side: Text Content -->
    <div class="text-right">
      <h1>An ion channel story</h1>
      <p>Lucia Coronel</p>
    </div>
  </div>

  <!-- Down Arrow -->
  <div class="arrow-down">
    ↓
  </div>

</body>
</html>
