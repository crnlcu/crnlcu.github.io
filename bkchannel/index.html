<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>An Ion Channel Story</title>
  <style>
 /* Fixed top menu bar */
    .menu-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #;
      color: white;
      padding: 10px 20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      z-index: 1000;
    }

    .menu-bar ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      display: flex;
    }

    .menu-bar ul li {
      margin-right: 10px;
    }

    .menu-bar ul li a {
      color: white;
      text-decoration: none;
      padding: 8px 15px;
      display: block;
    }

    .menu-bar ul li a:hover {
      background-color: #575757;
      border-radius: 5px;
    }
    /* General styles */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden; /* Prevent scrolling */
    }
  background-color: #000000;

    /* Fullscreen video background */
    .video-container {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 75vw;         /* Set the width to 75% of the viewport width */
    height: 60vh;        /* Set the height to 60% of the viewport height */
    overflow: hidden;    /* Hide the overflow (video clipping) */
}

/* Video inside the container */
.video-container video {
    position: absolute;
    top: 50%;             /* Vertically center the video */
    left: 50%;            /* Horizontally center the video */
    transform: translate(-50%, -50%); /* Center the video perfectly */
    min-width: 100%;      /* Ensure the video is at least as wide as the container */
    min-height: 100%;     /* Ensure the video is at least as tall as the container */
    object-fit: cover;    /* Ensures the video covers the container without stretching */
}

    /* Overlay content */
    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      box-sizing: border-box;
    }

    .text-left {
      width: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .text-right {
      width: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      text-align: left;
    }

    .text-right h1 {
      font-size: 3rem;
      margin: 0;
      font-weight: bold;
    }

    .text-right p {
      font-size: 1.2rem;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Downward arrow */
    .arrow-down {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 2rem;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(10px);
      }
    }
  </style>
</head>
<body>
<!-- Menu Bar -->
  <div class="menu-bar">
    <ul>
      <li><a href="#section1">home</a></li>
      <li><a href="#section2">bk</a></li>
      <li><a href="#section3">lipids</a></li>
      <li><a href="#section4">about this</a></li>
      <li><a href="#section4">about me</a></li>
    </ul>
  </div>
  <!-- Video Background -->
  <div class="video-container">
     <video autoplay muted loop>
      <source src="{{ site.baseurl }}/bkchannel/media/trajectory_video3.mp4" type="video/mp4">
   
    </video>
  </div>

  <!-- Overlay Content -->
  <div class="content">
    <!-- Left Side: Placeholder for Image or Video -->
    <div class="text-left">
     
    </div>
    <!-- Right Side: Text Content -->
    <div class="text-right">
      <h1>An ion channel story</h1>
      <p>Lucia Coronel</p>
    </div>
  </div>

  <!-- Down Arrow -->
  <div class="arrow-down">
    ↓
  </div>

</body>
</html>
