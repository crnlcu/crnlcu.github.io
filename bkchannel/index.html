<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>An Ion Channel Story</title>
  <style>
    /* Fixed top menu bar */
    .menu-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background-color: transparent;
      color: white;
      padding: 10px 20px;
      z-index: 1000;
      font-size: 1.5vw;
    }

    .menu-bar ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      display: flex;
    }

    .menu-bar ul li {
      margin-right: 10px;
    }

    .menu-bar ul li a {
      color: white;
      text-decoration: none;
      padding: 8px 15px;
      display: block;
    }

    .menu-bar ul li a:hover {
      background-color: #575757;
      border-radius: 5px;
    }

    /* General styles */
    body, html {
      margin: 0;
      padding: 0;
      height: auto;
      width: 100%;
      font-family: Arial, sans-serif;
      color: white;
      background-color: #000000;
    }

    .section0 {
      position: relative;
      width: 100vw;
      height: 65vw;
      color: white;
      overflow: hidden; /* Ensures the video doesn't overflow */
    }

    .section0 video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* Ensures the video covers the entire section */
      z-index: 1; /* Places the video behind other elements */
    }

    .text-right {
      width: 100%;
      position: absolute;
      left: 55vw;
      top: 20vh;
      padding: 20px;
      text-align: left;
      z-index: 1000;
      font-size: 2vw;
    }

    .text-right h1 {
      margin: 0;
      font-weight: bold;
    }

    .text-right p {
      font-size: 1.5vw;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Downward arrow */
    .arrow-down {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 10vw;
      animation: bounce 2s infinite;
      z-index: 1000;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(10px);
      }
    }

    a:link, a:hover {
      color: pink;
      background-color: transparent;
      text-decoration: none;
    }

    .section1 {
      width: 100vw;
      height: 76vw;
      padding: 20px;
    }
    .section2 {
      width: 100vw;
      height: 55vw;
      padding: 20px;
    }

    .section1 {
      background-color: white;
      color: black;
    }

    .section1 img {
      width: 100%;
      height: auto;
      align="bottom";
      border-radius: 8px;
      transition: transform 0.3s ease-in-out;
    }

    .section1 img:hover {
      transform: scale(1.05);
    }

    .section2 {
      background-color: black;
      color: white;
    }

    .section2 img {
      width: 18%;
      height: auto;
      align="bottom";
      border-radius: 8px;
      transition: transform 0.3s ease-in-out;
    }

    .section2 img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <!-- Section 0 -->
  <div class="section0" id="section0">
    <!-- Menu Bar -->
    <div class="menu-bar">
      <ul>
        <li><a href="/bkchannel/index.html">home</a></li>
        <li><a href="/bkchannel/bk/index.html">BK</a></li>
        <li><a href="/bkchannel/about/index.html">about this & me</a></li>
        <li><a href="/bkchannel/contact/index.html">contact me</a></li>
      </ul>
    </div>

    <!-- Video Background -->
    <video autoplay muted loop>
      <source src="https://crnlcu.github.io/bkchannel/media/videoBW.mp4" type="video/mp4">
    </video>

    <div class="text-right">
      <h1>An ion channel story</h1>
      <p>Lucia Coronel</p>
    </div>

    <!-- Down Arrow -->
    <div class="arrow-down"> ↓ </div>
  </div>

  <!-- Section 1 -->
  <div class="section1" id="section1">
    <h1 style="font-size:4vw;color:gray;text-align:right;">Images </h1>
    <img src="https://crnlcu.github.io/bkchannel/media/images.png" alt="Image 1">

      <p style="width:35vw;color:#8B61c2;text-align:right"> amino acid sequence visualization</p>
  
  </div>

  <!-- Section 2 -->
  <div class="section2" id="section2">
    <div style="display: inline-block;">
      <img src="https://crnlcu.github.io/bkchannel/media/helix0.png" alt="Image 1" style="width:16vw;height:auto;">
    
      <img src="https://crnlcu.github.io/bkchannel/media/helix1.png" alt="Image 2">
      <img src="https://crnlcu.github.io/bkchannel/media/helix2.png" alt="Image 3">
      <img src="https://crnlcu.github.io/bkchannel/media/helix3.png" alt="Image 4">
      <img src="https://crnlcu.github.io/bkchannel/media/helix4.png" alt="Image 5" style="width:20vw;height:auto;">
    </div>
  </div>
  
  <!-- Section 3 -->
  <div class="section1" id="section3">
    
    <img src="https://crnlcu.github.io/bkchannel/media/lato3.png" alt="" style="width:100vw;height:auto;">
    <p style="width:50vw;color:#8B61c2;text-align:center"> looking at the way out</p>
    <img src="https://crnlcu.github.io/bkchannel/media/3sotto.png" alt=""style="width:100vw;height:auto;">
</div>
  
  <!-- Section 3 -->
  <div class="section1" id="section4">
  
    <img src="https://crnlcu.github.io/bkchannel/media/tlayer.png" alt="" style="width:100vw;height:auto;">
    <p style="width:50vw;text-align:center"> bilayer membrane</p>
    <img src="https://crnlcu.github.io/bkchannel/media/blayer.png" alt=""style="width:100vw;height:auto;">
  </div>
</body>
</html>
