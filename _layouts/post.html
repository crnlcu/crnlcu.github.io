    .post-list {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  padding: 1rem 0;
}

.post-card {
  background: #ffffff;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
  padding: 1.5rem;
  transition: box-shadow 0.2s ease;
}

.post-card:hover {
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
}

.post-card h2 {
  margin-top: 0;
  margin-bottom: 0.5rem;
  font-size: 1.4rem;
}

.post-card h2 a {
  text-decoration: none;
}

.post-card h2 a:hover {
  text-decoration: underline;
}

.post-date {
  color: #888;
  font-size: 0.9rem;
  margin-bottom: 1rem;
}
    /* General styles */
    body, html {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: white;
    }

    .section0 {
      position: relative;
      width: 100vw;
      height: 65vw;
      overflow: hidden;
    }

    .section0 video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .text-right {
      position: absolute;
      left: 55vw;
      top: 20vh;
      padding: 20px;
      z-index: 2;
      font-size: 2vw;
    }

    .text-right h1 {
      margin: 0;
      font-weight: bold;
    }

    .text-right p {
      font-size: 1.5vw;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .arrow-down {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 10vw;
      animation: bounce 2s infinite;
      z-index: 2;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(10px);
      }
    }

    .section1, .section2 {
      width: 100vw;
      padding: 35px;
    }

    .section1 {
      background-color: white;
      color: black;
    }

    .section2 {
      background-color: black;
      color: white;
    }

    .section1 img, .section2 img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      transition: transform 0.3s ease-in-out;
    }

    .section1 img:hover, .section2 img:hover {
      transform: scale(1.05);
    }

    h1 {
      font-size: 4vw;
      color: gray;
      text-align: right;
    }

    p {
      color: #8B61C2;
      text-align: right;
    }
  </style>
</head>
<body>
  <!-- Section 0 -->
  <div class="section0" id="section0">
    <!-- Menu Bar -->
    <div class="menu-bar">
      <ul>
       <li><a href="/">Home</a></li> 
       <li><a href="/background">Background</a></li>
       <li><a href="/research">Research</a></li>
       <li><a href="/contact">Contact</a></li>
      <li><a href="/gallery/portfolio.html">Gallery</a></li>
        <li><a href="/bkchannel/index.html">An Ion Channel Story</a></li> 
      </ul>
    </div>

  


  </div>
  <div class="post-list">
  {% for post in site.posts %}
    <div class="post-card">
      <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
      <p class="post-date">{{ post.date | date: "%B %d, %Y" }}</p>
      {% if post.description %}
        <p>{{ post.description }}</p>
      {% endif %}
    </div>
  {% endfor %}
</div>
