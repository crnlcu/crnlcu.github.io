<style>
body {
  color: #888;
  font-family: 'Segoe UI', sans-serif;
  font-size: 12pt;
  font-weight: 300;
  line-height: 1.6;
}

.post-list {
  display: block;
  max-width: 60%;
  flex-direction: column;
  gap: 1.5rem;
  padding: 1rem 0;
}

.post-card {
  background: #ffffff;
  border-radius: 15px;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
  padding: 1.5rem;
  transition: box-shadow 0.2s ease;
}

.post-card:hover {
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
}

.post-card h2 {
  margin: 0 0 0.5rem;
  font-size: 1.4rem;
}

.post-card h2 a {
  text-decoration: none;
  color: #2c3e50;
}

.post-card h2 a:hover {
  text-decoration: underline;
}

.post-date {
  color: #888;
  font-size: 0.9rem;
  margin-bottom: 1rem;
}

.post-description {
  font-size: 1.1em;
  color: #555;
  margin: 10px 0 20px;
  font-style: italic;
}
</style>

<div class="post-list">
  {% for post in site.posts %}
    <div class="post-card">
      <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
      <p class="post-date">{{ post.date | date: "%B %d, %Y" }}</p>
      {% if post.description %}
        <p class="post-description">{{ post.description }}</p>
      {% endif %}
    </div>
  {% endfor %}
</div>
